name: Lab 1 Grading

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .env from GitHub Secrets
        run: |
          mkdir -p lab1
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > lab1/.env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> lab1/.env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> lab1/.env
          echo "DB_USER=${{ secrets.DB_USER }}" >> lab1/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> lab1/.env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> lab1/.env

      - name: Build and Start Containers
        run: docker compose -f lab1/docker-compose.yml up -d --build

      # 4. Чекаємо готовність сервісу app
      - name: Wait for App Readiness
        run: |
          for i in {1..20}; do
            if docker inspect --format='{{json .State.Health.Status}}' app | grep -q "healthy"; then
              echo "App is ready!"
              break
            fi
            echo "Waiting for app..."
            sleep 5
          done

      - name: Run Grading Script
        working-directory: ./lab1
        run: |
          chmod +x ./tests/lab1_test.sh
          ./tests/lab1_test.sh

      - name: Teardown
        run: docker compose -f lab1/docker-compose.yml down -v