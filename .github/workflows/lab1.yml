name: Lab 1 Grading

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .env from secrets
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env

      - name: Build and Start Containers
        run: |
          docker compose -f lab1/docker-compose.yml up -d --build \
            -e BOT_TOKEN=${{ secrets.BOT_TOKEN }} \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_PORT=${{ secrets.DB_PORT }}

      - name: Wait for App Readiness
        run: |
          for i in {1..20}; do
            if docker inspect --format='{{json .State.Health.Status}}' lab1_app_1 | grep -q "healthy"; then
              echo "App is ready!"
              break
            fi
            echo "Waiting for app..."
            sleep 5
          done

      - name: Run Grading Script
        working-directory: ./lab1
        run: |
          chmod +x ./tests/lab1_test.sh
          ./tests/lab1_test.sh

      - name: Teardown
        run: docker compose -f lab1/docker-compose.yml down -v